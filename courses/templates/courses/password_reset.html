{% extends 'courses/base.html' %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h2 style="text-align: center; color: #667eea;">🔑 Восстановление пароля</h2>
    <p style="text-align: center; color: #666; margin-bottom: 20px;">
        Введите ваш email, и мы отправим инструкцию для сброса пароля.
    </p>
    
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Email</label>
            <input type="email" name="email" autocomplete="off" class="form-control" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px;" placeholder="Введите ваш email">
        </div>
        
        {% if form.errors %}
            <div style="background: #ffebee; padding: 12px; border-radius: 10px; margin-bottom: 20px; color: #f44336; text-align: center;">
                ⚠️ Пользователь с таким email не найден
            </div>
        {% endif %}
        
        <button type="submit" class="btn" style="width: 100%; padding: 12px; font-size: 16px;">
            📧 Отправить инструкцию
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        <a href="/login/" style="color: #667eea; text-decoration: none;">← Вернуться ко входу</a>
    </p>
</div>

<style>
    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
</style>
{% endblock %}
