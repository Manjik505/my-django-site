{% extends 'courses/base.html' %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h2 style="text-align: center; color: #667eea;">🔐 Новый пароль</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Новый пароль</label>
            <input type="password" name="new_password1" class="form-control" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px;" placeholder="Введите новый пароль">
        </div>
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Подтверждение пароля</label>
            <input type="password" name="new_password2" class="form-control" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px;" placeholder="Повторите пароль">
        </div>
        
        {% if form.errors %}
            <div style="background: #ffebee; padding: 12px; border-radius: 10px; margin-bottom: 20px; color: #f44336;">
                {% for error in form.new_password2.errors %}
                    <div>⚠️ {{ error }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        <button type="submit" class="btn" style="width: 100%; padding: 12px; font-size: 16px;">
            🔓 Установить пароль
        </button>
    </form>
</div>

<style>
    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
</style>
{% endblock %}
